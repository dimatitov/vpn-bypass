name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o vpn-bypass ./cmd/vpn-bypass
          tar -czf dist/vpn-bypass_Darwin_arm64.tar.gz vpn-bypass

          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o vpn-bypass ./cmd/vpn-bypass
          tar -czf dist/vpn-bypass_Darwin_x86_64.tar.gz vpn-bypass

          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o vpn-bypass.exe ./cmd/vpn-bypass
          zip -j dist/vpn-bypass_Windows_x86_64.zip vpn-bypass.exe

          shasum -a 256 dist/* > dist/checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
